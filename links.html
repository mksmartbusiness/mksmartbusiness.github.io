<html lang="en">
<head>

  <style>
    :root {
      --sage:       #C8D8C0;
      --sage-mid:   #A8BEA0;
      --sage-deep:  #6B8F71;
      --forest:     #3A5C42;
      --dark:       #2A4232;
      --darkest:    #1A3028;
      --cream:      #F8F6F1;
      --muted:      rgba(200,216,192,0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--dark);
      color: var(--sage);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Botanical background SVG ── */
    .bg-botanical {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(700px, 140vw);
      height: auto;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Avatar / logo mark ── */
    .logo-mark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1.5px solid rgba(200,216,192,0.35);
      background: rgba(200,216,192,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
    }

    .logo-mark svg {
      width: 36px;
      height: 36px;
    }

    /* ── Heading block ── */
    .heading-block {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .heading-block h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-weight: 300;
      line-height: 1.15;
      color: #fff;
      letter-spacing: 0.01em;
      margin-bottom: 8px;
    }

    .heading-block h1 em {
      font-style: italic;
      color: var(--sage);
    }

    .heading-block p {
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(200,216,192,0.65);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider {
      width: 32px;
      height: 1px;
      background: rgba(200,216,192,0.3);
      margin: 0 auto 32px;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    /* ── Link buttons ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      padding: 15px 24px;
      border-radius: 3px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.25s, transform 0.2s, border-color 0.25s;
      border: 1px solid rgba(200,216,192,0.22);
      background: rgba(200,216,192,0.06);
      color: rgba(255,255,255,0.85);
    }

    .link-btn:hover {
      background: rgba(200,216,192,0.13);
      border-color: rgba(200,216,192,0.45);
      transform: translateY(-2px);
      color: #fff;
    }

    .link-btn.primary {
      background: var(--sage-deep);
      border-color: var(--sage-deep);
      color: #fff;
    }

    .link-btn.primary:hover {
      background: var(--forest);
      border-color: var(--forest);
    }

    .link-btn .icon {
      font-size: 1rem;
      flex-shrink: 0;
    }

    /* Stagger animations */
    .link-btn:nth-child(1) { animation: fadeUp 0.55s 0.2s ease both; }
    .link-btn:nth-child(2) { animation: fadeUp 0.55s 0.3s ease both; }
    .link-btn:nth-child(3) { animation: fadeUp 0.55s 0.4s ease both; }
    .link-btn:nth-child(4) { animation: fadeUp 0.55s 0.5s ease both; }
    .link-btn:nth-child(5) { animation: fadeUp 0.55s 0.6s ease both; }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      text-align: center;
      animation: fadeUp 0.55s 0.65s ease both;
    }

    .footer p {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(200,216,192,0.35);
    }

    .footer .tagline {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.88rem;
      font-style: italic;
      font-weight: 300;
      color: rgba(200,216,192,0.45);
      letter-spacing: 0.02em;
      text-transform: none;
      margin-top: 6px;
    }

    /* ── Animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
